name: 'QA Cortex Review'
description: 'AI-powered Playwright test review for pull requests. Scans changed test files and posts structured review comments.'
author: 'ridvan-byr'

branding:
  icon: 'search'
  color: 'purple'

inputs:
  github-token:
    description: 'GitHub token for PR comments and file access'
    required: true
    default: '${{ github.token }}'
  gemini-api-key:
    description: 'Gemini API key for LLM-powered review. If not provided, runs in Rule Engine Only mode.'
    required: false
    default: ''
  review-path:
    description: 'Path to scan. If empty, only changed files in the PR are reviewed.'
    required: false
    default: ''
  fail-on-critical:
    description: 'Set to true to fail the check when critical/high findings are detected.'
    required: false
    default: 'true'
  max-files:
    description: 'Maximum number of test files to review per PR. Protects against huge PRs.'
    required: false
    default: '30'
  ignore:
    description: 'Newline-separated glob patterns to exclude from review (e.g., **/generated/**).'
    required: false
    default: ''

outputs:
  files-reviewed:
    description: 'Number of test files reviewed.'
    value: ${{ steps.run-action.outputs.files-reviewed }}
  critical-findings:
    description: 'Number of critical/high findings detected.'
    value: ${{ steps.run-action.outputs.critical-findings }}

runs:
  using: 'composite'
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Action Dependencies
      run: npm ci
      shell: bash
      working-directory: ${{ github.action_path }}

    - name: Build Action
      run: npm run build
      shell: bash
      working-directory: ${{ github.action_path }}

    - name: Run review action
      id: run-action
      run: node ${{ github.action_path }}/dist/src/action.js
      shell: bash
      env:
        INPUT_GITHUB-TOKEN: ${{ inputs.github-token }}
        INPUT_GEMINI-API-KEY: ${{ inputs.gemini-api-key }}
        INPUT_REVIEW-PATH: ${{ inputs.review-path }}
        INPUT_FAIL-ON-CRITICAL: ${{ inputs.fail-on-critical }}
        INPUT_MAX-FILES: ${{ inputs.max-files }}
        INPUT_IGNORE: ${{ inputs.ignore }}
